[ids]

*

[main]

# map capslock to escape when pressed and control when held
capslock = overload(control, esc)

# swap meta and win
leftalt = leftmeta
leftmeta = leftalt
rightalt = rightmeta
rightmeta = rightalt

# Apple Studio Display brightness keys (NuPhy sends F15 = up, F14 = down)
f15 = command(/home/petar/.local/bin/asd-brightness up)
f14 = command(/home/petar/.local/bin/asd-brightness down)
