# MELANGE LIGHT THEME BEGIN

# Neutrals (from melange light palette: a.*)
color_fg="#54433A"
color_com="#7D6658"
color_ui="#A98A78"
color_sel="#D9D3CE"
color_float="#E9E1DB"
color_bg="#F1F1F1"

# Accents (melange light palette: b.* strong, c.yellow for orange)
color_red="#BF0021"
color_orange="#BC5C00"
color_yellow="#A06D00"
color_green="#3A684A"
color_cyan="#3D6568"
color_blue="#465AA4"
color_magenta="#904180"

# by default window names will just be their index
set-option -g automatic-rename              on
set-option -g automatic-rename-format       "#I"

# set to 12 for a 12-hour clock
set-option -g clock-mode-style              24
set-option -g clock-mode-colour             "$color_green"

# NOTE: color variable expansion only works in double quotes
set-option -g status-fg                     "$color_fg"
set-option -g status-bg                     "$color_float"
set-option -g copy-mode-current-match-style "fg=$color_bg,bg=$color_orange"
set-option -g copy-mode-match-style         "fg=$color_bg,bg=$color_blue"
set-option -g menu-selected-style           "fg=$color_bg,bg=$color_blue"
set-option -g menu-style                    "fg=$color_fg,bg=$color_float"
set-option -g message-style                 "bg=$color_yellow,fg=$color_bg"
set-option -g message-command-style         "bg=$color_sel,fg=$color_fg"
set-option -g mode-style                    "bg=$color_sel,fg=$color_fg"
set-option -g pane-active-border-style      "fg=$color_blue"
set-option -g pane-border-lines             "heavy"
set-option -g pane-border-style             "fg=$color_sel"
set-option -g popup-border-lines            "rounded"
set-option -g status-right-style            "fg=$color_com"
set-option -g window-status-current-style   "fg=$color_blue"
set-option -g window-status-style           "fg=$color_com"
set -g default-terminal "${TERM}"
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'  # undercurl support
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'  # underscore colours - needs tmux-3.0

# display the window index number or index-number:name if has a name
set-option -g window-status-separator      ''
set-option -g window-status-format         '#[fg=#7D6658]#[bg=#E9E1DB] #{?#{==:#W, },#I,#I #[fg=#A98A78]#[bg=#D9D3CE] #W }'
set-option -g window-status-current-format '#[fg=#54433A]#[bg=#F1F1F1]#[bold] #{?#{==:#W, },#I,#I #[fg=#465AA4]#[bg=#D9D3CE] #W }'

# status right will show the current session name if there is more than one session
set-option -g status-right                 '#{?#{>:#{server_sessions},1}, #[fg=#3A684A]◆ #[fg=#54433A]#{session_name} ,}'
set-option -g status-left                  ''
# MELANGE LIGHT THEME END
